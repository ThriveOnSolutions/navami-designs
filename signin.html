<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Navami Designs</title>
  <meta name="description" content="Sign in to your Navami project workspace — ledger, approvals, lender packets, and savings tracker." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='10' fill='%2316110D'/%3E%3Ctext x='50%25' y='68%25' text-anchor='middle' font-family='Georgia,serif' font-style='italic' font-weight='400' font-size='22' fill='%23F4EFE6'%3En%3C/text%3E%3Ccircle cx='24.5' cy='22.5' r='1.9' fill='%23B68A4E'/%3E%3C/svg%3E" />
</head>
<body>

  <main class="auth-shell">
    <div class="auth-shell__visual" style="background-image:url('assets/hero-exterior.jpg')">
      <blockquote class="auth-shell__quote">
        Welcome back to your <em>build.</em>
      </blockquote>
    </div>

    <div class="auth-shell__form">
      <div class="auth-shell__form-inner">
        <a href="/" class="auth-shell__back">← Back to home</a>

        <div class="eyebrow">Sign in</div>
        <h1>Open your <em>workspace.</em></h1>
        <p class="auth-shell__hint">New here? <a href="/signup.html">Reserve a spot →</a></p>

        <form class="form" data-validate>
          <div class="field"><label>Email</label><input type="email" name="email" required /></div>
          <div class="field"><label>Password</label><input type="password" name="password" required minlength="8" /></div>

          <div class="flex" style="justify-content:space-between;align-items:center;margin-top:4px">
            <div class="field--check" style="margin:0"><input type="checkbox" id="remember" /><label for="remember" style="text-transform:none;letter-spacing:0;font-family:var(--sans);font-size:13px">Keep me signed in</label></div>
            <a href="#" style="font-size:13px;border-bottom:1px solid var(--brass);padding-bottom:1px">Forgot password</a>
          </div>

          <button type="submit" class="btn btn--primary auth-shell__submit">Sign in</button>
        </form>

        <div class="auth-shell__divider">or continue with</div>
        <div class="auth-shell__oauth">
          <button class="oauth-btn"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.3c0-.8-.1-1.5-.2-2.3H12v4.4h5.9c-.3 1.4-1 2.5-2.2 3.3v2.7h3.6c2.1-1.9 3.2-4.8 3.2-8.1z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.7c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.4v2.8C4.2 20.5 7.8 23 12 23z"/><path fill="#FBBC05" d="M6 14.3c-.2-.7-.4-1.4-.4-2.3s.1-1.6.4-2.3V6.9H2.4C1.6 8.4 1.1 10.1 1.1 12c0 1.9.5 3.6 1.3 5.1L6 14.3z"/><path fill="#EA4335" d="M12 5.5c1.6 0 3 .5 4.1 1.6l3.1-3.1C17.4 2.1 14.9 1 12 1 7.8 1 4.2 3.5 2.4 6.9L6 9.7c.9-2.5 3.2-4.4 6-4.4z"/></svg> Google</button>
          <button class="oauth-btn"><svg width="14" height="16" viewBox="0 0 14 16" fill="currentColor"><path d="M11.8 8.3c0-1.5.8-2.7 2-3.5-.7-1-1.8-1.6-3.2-1.7-1.4-.1-2.9.8-3.5.8-.6 0-1.9-.8-3.1-.8-1.6.1-3.1 1-3.9 2.4-1.7 2.9-.4 7.2 1.2 9.5.8 1.1 1.7 2.4 3 2.4s1.6-.8 3.1-.8c1.4 0 1.8.8 3.1.8 1.3 0 2.1-1.2 2.9-2.3.6-.8 1.1-1.7 1.4-2.7-1.6-.6-2.9-2.3-3-4.1zM9.5 1.8c.7-.8 1.1-1.9 1-3-.9.1-2 .6-2.6 1.4-.6.7-1.1 1.8-1 2.9 1 .1 2-.5 2.6-1.3z"/></svg> Apple</button>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
